<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>LifePilot — Ejercicios</title>
<style>
:root{
  --bg:#08080C;
  --card:rgba(255,255,255,.055);
  --brd:rgba(255,255,255,.09);
  --tx:#fff;
  --tx2:rgba(255,255,255,.6);
  --tx3:rgba(255,255,255,.32);
  --grn:#34D058;--grn-d:rgba(52,208,88,.15);
  --blu:#2C7EFF;--blu-d:rgba(44,126,255,.15);
  --org:#FF9F0A;--org-d:rgba(255,159,10,.15);
  --pur:#BF5AF2;--pur-d:rgba(191,90,242,.15);
  --red:#FF453A;--red-d:rgba(255,69,58,.15);
  --yel:#FFD60A;--yel-d:rgba(255,214,10,.12);
  --r:16px;--sab:env(safe-area-inset-bottom,34px);
  --f:-apple-system,'SF Pro Display',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:var(--f);color:var(--tx);overflow-x:hidden;-webkit-font-smoothing:antialiased}

body::before{
  content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(ellipse 60% 40% at 15% 15%,rgba(44,126,255,.07) 0%,transparent 60%),
             radial-gradient(ellipse 50% 40% at 85% 80%,rgba(191,90,242,.06) 0%,transparent 55%),
             radial-gradient(ellipse 40% 30% at 50% 50%,rgba(52,208,88,.03) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}

/* ── LAYOUT ── */
#app{position:relative;z-index:1;min-height:100dvh;max-width:480px;margin:0 auto;padding:0 16px calc(var(--sab)+24px)}

/* ── HEADER ── */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(env(safe-area-inset-top,44px)+12px) 0 20px;
}
.top-back{
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,.07);border:1px solid var(--brd);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;color:rgba(255,255,255,.7);cursor:pointer;
  text-decoration:none;
}
.top-title{font-size:18px;font-weight:700;letter-spacing:-.3px}
.top-badge{
  font-size:11px;font-weight:700;padding:5px 12px;border-radius:100px;
  background:var(--org-d);color:var(--org);border:1px solid rgba(255,159,10,.2);
}

/* ── DAY SELECTOR ── */
.day-strip{
  display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:20px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.day-strip::-webkit-scrollbar{display:none}
.day-btn{
  flex-shrink:0;display:flex;flex-direction:column;align-items:center;
  padding:10px 14px;border-radius:14px;cursor:pointer;
  border:1px solid var(--brd);background:var(--card);
  transition:all .14s;min-width:62px;
}
.day-btn:active{transform:scale(.93)}
.day-btn.active{background:rgba(255,159,10,.12);border-color:rgba(255,159,10,.3)}
.day-btn.rest{opacity:.5}
.day-btn .day-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--tx3);margin-bottom:4px}
.day-btn.active .day-name{color:var(--org)}
.day-btn .day-icon{font-size:20px;line-height:1;margin-bottom:4px}
.day-btn .day-label{font-size:10px;font-weight:600;color:var(--tx3);text-align:center;line-height:1.2}
.day-btn.active .day-label{color:var(--org)}
.day-progress{width:100%;height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:6px;overflow:hidden}
.day-progress-fill{height:100%;border-radius:2px;background:var(--grn);transition:width .4s}

/* ── WEEKLY SUMMARY ── */
.week-summary{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;
}
.ws-card{
  background:var(--card);border:1px solid var(--brd);border-radius:14px;
  padding:12px 14px;text-align:center;position:relative;overflow:hidden;
}
.ws-card::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent)}
.ws-val{font-size:22px;font-weight:700;line-height:1;margin-bottom:3px}
.ws-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--tx3)}

/* ── EXERCISE CARD ── */
.ex-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;overflow:hidden;
  margin-bottom:12px;
  transition:all .15s;
}
.ex-card.completed{opacity:.55}
.ex-card.active-card{border-color:rgba(44,126,255,.35);background:rgba(44,126,255,.05)}

/* Exercise header — tap to expand */
.ex-header{
  display:flex;align-items:center;gap:14px;padding:16px;
  cursor:pointer;position:relative;
}
.ex-check{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  border:2px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;cursor:pointer;
}
.ex-check.done{background:var(--grn);border-color:var(--grn);box-shadow:0 0 12px rgba(52,208,88,.4)}
.ex-check.done::after{content:'✓';font-size:14px;font-weight:800;color:#000}

.ex-info{flex:1;min-width:0}
.ex-name{font-size:16px;font-weight:700;color:var(--tx);margin-bottom:3px}
.ex-meta{display:flex;gap:8px;flex-wrap:wrap}
.ex-tag{
  font-size:11px;font-weight:600;padding:3px 9px;border-radius:100px;
}
.tag-sets{background:var(--blu-d);color:var(--blu)}
.tag-weight{background:var(--org-d);color:var(--org)}
.tag-muscle{background:var(--pur-d);color:var(--pur)}

.ex-chevron{
  font-size:18px;color:rgba(255,255,255,.25);
  transition:transform .2s;flex-shrink:0;
}
.ex-chevron.open{transform:rotate(90deg)}

/* Exercise body — expandable */
.ex-body{
  display:none;padding:0 16px 16px;
  animation:fadeInDown .2s ease;
}
.ex-body.open{display:block}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* GIF section */
.ex-gif-wrap{
  border-radius:14px;overflow:hidden;
  background:rgba(255,255,255,.04);border:1px solid var(--brd);
  margin-bottom:14px;position:relative;min-height:200px;
  display:flex;align-items:center;justify-content:center;
}
.ex-gif-wrap img{width:100%;border-radius:14px;display:block}
.ex-gif-loading{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  color:var(--tx3);font-size:13px;padding:40px;
}
.gif-spinner{
  width:28px;height:28px;border-radius:50%;
  border:3px solid rgba(255,255,255,.1);
  border-top-color:var(--blu);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.ex-gif-fallback{
  width:100%;padding:20px;text-align:center;
}
/* SVG muscle diagram placeholder */
.muscle-diagram{
  width:100%;max-width:200px;margin:0 auto 12px;
  border-radius:10px;overflow:hidden;
}

/* Instructions */
.ex-instructions{
  background:rgba(255,255,255,.04);border-radius:14px;
  padding:14px;margin-bottom:12px;border:1px solid rgba(255,255,255,.06);
}
.ex-instr-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);margin-bottom:10px}
.ex-step{
  display:flex;align-items:flex-start;gap:10px;
  padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);
}
.ex-step:last-child{border-bottom:none}
.ex-step-num{
  min-width:22px;height:22px;border-radius:50%;
  background:var(--blu-d);color:var(--blu);
  font-size:11px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
}
.ex-step-text{font-size:13px;color:var(--tx2);line-height:1.5}

/* Tip box */
.ex-tip{
  display:flex;align-items:flex-start;gap:10px;
  padding:12px 14px;border-radius:12px;
  background:var(--yel-d);border:1px solid rgba(255,214,10,.15);
  margin-bottom:12px;font-size:13px;color:rgba(255,255,255,.7);line-height:1.5;
}
.ex-tip-icon{font-size:16px;flex-shrink:0;margin-top:1px}

/* AI form coach */
.ai-coach-btn{
  width:100%;padding:12px;border-radius:12px;
  background:var(--pur-d);border:1px solid rgba(191,90,242,.2);
  color:var(--pur);font-size:13px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  transition:all .14s;font-family:var(--f);margin-bottom:12px;
}
.ai-coach-btn:active{transform:scale(.96)}
.ai-coach-result{
  background:rgba(255,255,255,.04);border:1px solid var(--brd);
  border-radius:12px;padding:14px;font-size:13px;color:var(--tx2);
  line-height:1.6;margin-bottom:12px;display:none;
}

/* Sets tracker */
.sets-tracker{margin-bottom:4px}
.sets-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);margin-bottom:10px}
.sets-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.set-num{font-size:12px;font-weight:600;color:var(--tx3);min-width:40px}
.set-reps{
  flex:1;padding:9px 12px;border-radius:100px;
  background:rgba(255,255,255,.07);border:1px solid var(--brd);
  color:var(--tx);font-size:14px;font-family:var(--f);outline:none;
  text-align:center;
}
.set-reps:focus{border-color:rgba(44,126,255,.4);box-shadow:0 0 0 3px rgba(44,126,255,.1)}
.set-weight{
  width:80px;padding:9px 12px;border-radius:100px;
  background:rgba(255,255,255,.07);border:1px solid var(--brd);
  color:var(--tx);font-size:14px;font-family:var(--f);outline:none;
  text-align:center;
}
.set-check{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  border:2px solid rgba(255,255,255,.15);
  background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:all .15s;color:rgba(255,255,255,.3);
}
.set-check.done{background:var(--grn);border-color:var(--grn);color:#000;font-weight:700;box-shadow:0 0 10px rgba(52,208,88,.35)}
.set-check:active{transform:scale(.88)}

/* Progression badge */
.progression-banner{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border-radius:14px;
  background:linear-gradient(135deg,rgba(52,208,88,.1),rgba(44,126,255,.08));
  border:1px solid rgba(52,208,88,.15);margin-bottom:12px;
}
.progression-icon{font-size:22px}
.progression-text{font-size:13px;color:rgba(255,255,255,.75);line-height:1.4}
.progression-text strong{color:var(--grn)}

/* Personal records */
.pr-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);
  font-size:12px;
}
.pr-row:last-child{border-bottom:none}
.pr-date{color:var(--tx3)}
.pr-val{font-weight:700;color:var(--tx)}

/* Rest timer */
.rest-timer{
  position:fixed;bottom:calc(var(--sab)+20px);left:50%;transform:translateX(-50%);
  background:rgba(8,8,12,.95);border:1px solid rgba(255,255,255,.12);
  border-radius:20px;padding:16px 24px;
  display:flex;align-items:center;gap:16px;
  backdrop-filter:blur(20px);z-index:100;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  opacity:0;transition:all .3s;pointer-events:none;
}
.rest-timer.visible{opacity:1;pointer-events:auto}
.rest-circle{
  width:56px;height:56px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:700;color:var(--org);
  position:relative;
}
.rest-circle svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.rest-info{display:flex;flex-direction:column;gap:2px}
.rest-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3)}
.rest-msg{font-size:13px;font-weight:600;color:var(--tx2)}
.rest-skip{
  padding:8px 14px;border-radius:100px;
  background:rgba(255,255,255,.08);border:1px solid var(--brd);
  color:var(--tx2);font-size:12px;font-weight:600;
  cursor:pointer;font-family:var(--f);
}

/* Finish workout button */
.finish-btn{
  width:100%;padding:16px;border-radius:16px;
  background:linear-gradient(135deg,var(--grn),#28A745);
  border:none;color:#000;font-family:var(--f);
  font-size:16px;font-weight:800;cursor:pointer;
  margin-top:16px;margin-bottom:8px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .15s;letter-spacing:-.2px;
}
.finish-btn:active{transform:scale(.97)}

/* Completion overlay */
.complete-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(8,8,12,.95);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px;text-align:center;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.complete-overlay.show{opacity:1;pointer-events:auto}
.complete-emoji{font-size:72px;margin-bottom:20px;animation:bounce .6s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.complete-title{font-size:32px;font-weight:800;margin-bottom:8px;letter-spacing:-1px}
.complete-sub{font-size:16px;color:var(--tx2);margin-bottom:28px;line-height:1.5}
.complete-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;margin-bottom:28px}
.complete-stat{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:14px 10px;text-align:center}
.complete-stat-val{font-size:22px;font-weight:700;color:var(--grn);margin-bottom:3px}
.complete-stat-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--tx3)}
.complete-ai{
  background:var(--pur-d);border:1px solid rgba(191,90,242,.2);
  border-radius:14px;padding:14px 16px;font-size:14px;color:var(--tx2);
  line-height:1.6;margin-bottom:20px;width:100%;text-align:left;
}
.complete-close{
  padding:14px 32px;border-radius:100px;
  background:rgba(255,255,255,.08);border:1px solid var(--brd);
  color:var(--tx);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--f);
}

/* Tabs: today / history / program */
.main-tabs{
  display:flex;gap:4px;margin-bottom:20px;
  background:rgba(255,255,255,.05);border-radius:12px;padding:4px;
}
.main-tab{
  flex:1;padding:9px;border-radius:10px;text-align:center;
  font-size:13px;font-weight:600;color:var(--tx3);cursor:pointer;transition:all .15s;
}
.main-tab.on{background:rgba(255,255,255,.1);color:var(--tx)}

/* History cards */
.hist-card{
  background:var(--card);border:1px solid var(--brd);
  border-radius:16px;padding:14px 16px;margin-bottom:10px;
}
.hist-date{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--tx3);margin-bottom:8px}
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px}
.hist-row:last-child{border-bottom:none}
.hist-name{color:var(--tx2)}
.hist-weight{font-weight:700;color:var(--org)}

/* Empty state */
.empty-state{text-align:center;padding:48px 24px;color:var(--tx3)}
.empty-state .em-icon{font-size:48px;margin-bottom:16px;opacity:.5}
.empty-state p{font-size:14px;line-height:1.6}

/* Section headers */
.section-lbl{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.9px;color:var(--tx3);
  margin:20px 0 10px;
}

/* Squat / lower body section */
.muscle-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.m-tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:100px}

/* Program card */
.prog-week{
  background:var(--card);border:1px solid var(--brd);
  border-radius:16px;padding:16px;margin-bottom:12px;
}
.prog-week-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.prog-week-title{font-size:15px;font-weight:700}
.prog-week-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:100px}

/* ── SECTION SKELETON ── */
.section-header{
  display:flex;align-items:center;gap:10px;
  padding:14px 16px;
  background:linear-gradient(135deg,rgba(255,159,10,.08),rgba(255,159,10,.03));
  border-bottom:1px solid rgba(255,159,10,.1);
}
.section-header .sh-icon{font-size:24px}
.section-header .sh-title{font-size:17px;font-weight:700;color:var(--tx)}
.section-header .sh-sub{font-size:12px;color:var(--tx3);margin-top:1px}
</style>
</head>
<body>

<div id="app">

  <!-- TOP BAR -->
  <div class="top-bar">
    <a href="mobile.html" class="top-back">‹</a>
    <div class="top-title">💪 Ejercicios</div>
    <div class="top-badge" id="top-streak"></div>
  </div>

  <!-- MAIN TABS -->
  <div class="main-tabs">
    <div class="main-tab on" onclick="switchTab('hoy')">Hoy</div>
    <div class="main-tab" onclick="switchTab('historial')">Historial</div>
    <div class="main-tab" onclick="switchTab('programa')">Programa</div>
  </div>

  <!-- ── TAB: HOY ── -->
  <div id="tab-hoy">
    <!-- Weekly overview strip -->
    <div class="day-strip" id="day-strip"></div>
    <!-- Weekly summary stats -->
    <div class="week-summary" id="week-summary"></div>
    <!-- Workout content -->
    <div id="workout-content"></div>
  </div>

  <!-- ── TAB: HISTORIAL ── -->
  <div id="tab-historial" style="display:none">
    <div id="history-content"></div>
  </div>

  <!-- ── TAB: PROGRAMA ── -->
  <div id="tab-programa" style="display:none">
    <div id="program-content"></div>
  </div>

</div>

<!-- REST TIMER -->
<div class="rest-timer" id="rest-timer">
  <div class="rest-circle">
    <svg width="56" height="56" viewBox="0 0 56 56">
      <circle cx="28" cy="28" r="24" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="4"/>
      <circle cx="28" cy="28" r="24" fill="none" stroke="var(--org)" stroke-width="4"
        stroke-dasharray="150.8" id="rest-arc" stroke-dashoffset="0" stroke-linecap="round"/>
    </svg>
    <span id="rest-count">60</span>
  </div>
  <div class="rest-info">
    <div class="rest-label">Descanso</div>
    <div class="rest-msg" id="rest-msg">Recuperando...</div>
  </div>
  <div class="rest-skip" onclick="skipRest()">Saltar</div>
</div>

<!-- COMPLETION OVERLAY -->
<div class="complete-overlay" id="complete-overlay">
  <div class="complete-emoji">🏆</div>
  <div class="complete-title">¡Entreno completado!</div>
  <div class="complete-sub" id="complete-sub">Has terminado el entrenamiento de hoy.</div>
  <div class="complete-stats" id="complete-stats"></div>
  <div class="complete-ai" id="complete-ai" style="display:none"></div>
  <button class="complete-close" onclick="closeComplete()">Volver al inicio</button>
</div>

<script>
// ═══════════════════════════════════════════
// LIFEPILOT EJERCICIOS — Sistema completo
// ═══════════════════════════════════════════
const GROQ_KEY='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';
const EX_DB_BASE='https://exercisedb.io/api/v2/exercises';

// ── Storage helpers (mismo prefijo que LifePilot) ──
const lp=k=>JSON.parse(localStorage.getItem('lp_'+k)||'null');
const sp=(k,v)=>localStorage.setItem('lp_'+k,JSON.stringify(v));
const dk=()=>new Date().toISOString().slice(0,10);
const tdk=()=>['dom','lun','mar','mie','jue','vie','sab'][new Date().getDay()];

// ── Exercise Program — 4 días semana ──
// Incluye SENTADILLAS y PESAS como pide Daniel
const PROGRAMA = {
  lun:{
    label:'Lunes',emoji:'💪',tipo:'Fuerza',color:'var(--org)',
    grupos:['Bíceps','Espalda'],
    ejercicios:[
      {
        id:'curl_biceps',nombre:'Curl de bíceps',
        musculos_principales:['Bíceps'],musculos_secundarios:['Antebrazo'],
        series:3,reps:'10-12',peso_inicial:5,rest_seg:60,
        ex_db_name:'dumbbell biceps curl',
        instrucciones:[
          'De pie, pies a anchura de caderas, espalda recta y core apretado.',
          'Codos PEGADOS a los costados — este es el detalle más importante. No los muevas.',

// ── State ──
let curDay = tdk();
let curTab = 'hoy';
let restTimer = null;
let restSecsLeft = 0;
let expandedEx = null;

// ── Helpers ──
function getWeightForEx(exId){
  const history = lp('ex_weights_'+exId) || [];
  if(!history.length) return PROGRAMA[curDay]?.ejercicios?.find(e=>e.id===exId)?.peso_inicial || 5;
  return history[history.length-1].peso;
}
function saveWeight(exId, peso){
  const history = lp('ex_weights_'+exId) || [];
  history.push({fecha:dk(), peso});
  sp('ex_weights_'+exId, history.slice(-30));
}
function getSetsForToday(exId){
  return lp('ex_sets_'+dk()+'_'+exId) || [];
}
function saveSets(exId, sets){
  sp('ex_sets_'+dk()+'_'+exId, sets);
  // Also save to history
  const hist = lp('ex_history') || [];
  hist.push({fecha:dk(),exId,sets,dia:curDay});
  sp('ex_history', hist.slice(-200));
}
function isExCompleted(exId){
  const sets = getSetsForToday(exId);
  const ex = PROGRAMA[curDay]?.ejercicios?.find(e=>e.id===exId);
  if(!ex) return false;
  return sets.filter(s=>s.done).length >= ex.series;
}
function getStreak(){
  let streak=0,dt=new Date();
  for(let i=0;i<30;i++){
    dt.setDate(dt.getDate()-(i===0?0:1));
    const k=dt.toISOString().slice(0,10);
    const dayKey=['dom','lun','mar','mie','jue','vie','sab'][dt.getDay()];
    const prog=PROGRAMA[dayKey];
    if(!prog?.ejercicios?.length){if(i>0)streak++;continue}
    const allDone=prog.ejercicios.every(ex=>lp('ex_sets_'+k+'_'+ex.id)?.filter(s=>s.done).length>=ex.series);
    if(allDone)streak++;
    else if(i>0)break;
  }
  return streak;
}

// ── INIT ──
function init(){
  // Update streak badge
  const streak=getStreak();
  const sb=document.getElementById('top-streak');
  if(sb) sb.textContent = streak>0?`🔥 ${streak} días`:'Empieza hoy';

  renderDayStrip();
  renderWeekSummary();
  renderWorkout();
}

// ── DAY STRIP ──
function renderDayStrip(){
  const el=document.getElementById('day-strip');if(!el)return;
  const days=['lun','mar','mie','jue','vie','sab','dom'];
  const today=tdk();
  el.innerHTML=days.map(d=>{
    const prog=PROGRAMA[d];
    const isToday=d===today;
    const isCur=d===curDay;
    const isRest=!prog.ejercicios?.length;
    let pct=0;
    if(!isRest){
      const done=prog.ejercicios.filter(ex=>isExCompleted(ex.id)).length;
      pct=Math.round(done/prog.ejercicios.length*100);
    }
    return `<div class="day-btn ${isCur?'active':''} ${isRest?'rest':''}" onclick="selectDay('${d}')">
      <div class="day-name">${prog.label.slice(0,3)}</div>
      <div class="day-icon">${prog.emoji}</div>
      <div class="day-label">${isRest?'Desc.':prog.tipo}</div>
      ${!isRest?`<div class="day-progress"><div class="day-progress-fill" style="width:${pct}%"></div></div>`:''}
    </div>`;
  }).join('');
}

// ── WEEK SUMMARY ──
function renderWeekSummary(){
  const el=document.getElementById('week-summary');if(!el)return;
  const days=['lun','mar','mie','jue'];
  let entrenos=0,series=0,maxWeight=0;
  days.forEach(d=>{
    const prog=PROGRAMA[d];
    if(!prog.ejercicios?.length) return;
    const allDone=prog.ejercicios.every(ex=>isExCompleted(ex.id));
    if(allDone) entrenos++;
    prog.ejercicios.forEach(ex=>{
      const sets=getSetsForToday(ex.id);
      series+=sets.filter(s=>s.done).length;
      sets.forEach(s=>{if((s.peso||0)>maxWeight)maxWeight=s.peso});
    });
  });
  const vol=series*10; // rough volume estimate
  el.innerHTML=`
    <div class="ws-card">
      <div class="ws-val" style="color:var(--grn)">${entrenos}/4</div>
      <div class="ws-lbl">Entrenos</div>
    </div>
    <div class="ws-card">
      <div class="ws-val" style="color:var(--blu)">${series}</div>
      <div class="ws-lbl">Series</div>
    </div>
    <div class="ws-card">
      <div class="ws-val" style="color:var(--org)">${maxWeight||'—'}kg</div>
      <div class="ws-lbl">Max peso</div>
    </div>`;
}

// ── SELECT DAY ──
function selectDay(d){
  curDay=d;
  renderDayStrip();
  renderWorkout();
}

        <div style="font-size:12px;color:var(--tx3)">${done===0?'Toca un ejercicio para empezar':done===total?'🏆 ¡Entrenamiento completado!':'Sigue así, lo estás haciendo bien'}</div>
      </div>
    </div>`;

  // Exercise cards
  prog.ejercicios.forEach(ex=>{
    const completed=isExCompleted(ex.id);
    const sets=getSetsForToday(ex.id);
    const curWeight=getWeightForEx(ex.id);
    const isExpanded=expandedEx===ex.id;
    // Check if should suggest progression
    const progression=checkProgression(ex.id);

    h+=`<div class="ex-card ${completed?'completed':''} ${isExpanded?'active-card':''}" id="card-${ex.id}">

      <div class="ex-header" onclick="toggleEx('${ex.id}')">

            ${ex.peso_inicial?`<span class="ex-tag tag-weight" id="tag-w-${ex.id}">${curWeight}kg</span>`:''}
            <span class="ex-tag tag-muscle">${ex.musculos_principales[0]}</span>
          </div>
        </div>
        <div class="ex-chevron ${isExpanded?'open':''}">›</div>
      </div>

      <!-- Body -->
      <div class="ex-body ${isExpanded?'open':''}" id="body-${ex.id}">

        ${progression?`<div class="progression-banner">
          <div class="progression-icon">📈</div>
          <div class="progression-text"><strong>¡Hora de subir peso!</strong><br>${progression}</div>
        </div>`:''}

        <!-- GIF -->
        <div class="ex-gif-wrap" id="gif-${ex.id}">
          <div class="ex-gif-loading"><div class="gif-spinner"></div>Cargando animación...</div>
        </div>

        <!-- Instructions -->
        <div class="ex-instructions">
          <div class="ex-instr-title">Técnica paso a paso</div>
          ${ex.instrucciones.map((s,i)=>`
            <div class="ex-step">
              <div class="ex-step-num">${i+1}</div>
              <div class="ex-step-text">${s}</div>
            </div>`).join('')}
        </div>

        <!-- Tip -->
        <div class="ex-tip">
          <div class="ex-tip-icon">💡</div>
          <div>${ex.tip}</div>
        </div>

        <!-- AI Coach button -->
        <button class="ai-coach-btn" onclick="getAICoach('${ex.id}')">
          🤖 Analizar mi técnica con IA
        </button>
        <div class="ai-coach-result" id="ai-${ex.id}"></div>

        <!-- Sets tracker -->
        <div class="sets-tracker">
          <div class="sets-title">Registro de series</div>
          <div id="sets-${ex.id}">
            ${renderSetsHTML(ex, sets, curWeight)}
          </div>
        </div>

      </div>
    </div>`;
  });

  // Finish button if all done
  if(done===total&&total>0){
    h+=`<button class="finish-btn" onclick="finishWorkout()">
      🏆 Finalizar entrenamiento
    </button>`;
  }

  el.innerHTML=h;

  // Load GIFs for expanded exercise
  if(expandedEx) loadGif(expandedEx);
}

// ── RENDER SETS HTML ──
function renderSetsHTML(ex, savedSets, curWeight){
  let h='';
  for(let i=0;i<ex.series;i++){
    const s=savedSets[i]||{reps:'',peso:curWeight,done:false};
    h+=`<div class="sets-row">
      <div class="set-num">Serie ${i+1}</div>
      <input class="set-reps" type="number" min="1" max="50" placeholder="${ex.reps.split('-')[0]||10}"
        value="${s.reps||''}" id="reps-${ex.id}-${i}" onchange="updateSet('${ex.id}',${i})">
      ${ex.peso_inicial?`<input class="set-weight" type="number" min="0" max="100" step="0.5"
        placeholder="${curWeight}"
        value="${s.peso||curWeight}" id="w-${ex.id}-${i}" onchange="updateSet('${ex.id}',${i})">`:
        '<div style="width:80px;font-size:11px;color:var(--tx3);text-align:center">Peso corporal</div>'}
      <div class="set-check ${s.done?'done':''}" id="sc-${ex.id}-${i}"
        onclick="toggleSet('${ex.id}',${i})">
        ${s.done?'✓':''}
      </div>
    </div>`;
  }
  return h;
}

// ── LOAD GIF from ExerciseDB ──
async function loadGif(exId){
  const gifEl=document.getElementById('gif-'+exId);if(!gifEl)return;
  const prog=PROGRAMA[curDay];
  const ex=prog?.ejercicios?.find(e=>e.id===exId);if(!ex)return;

  // Check cache
  const cached=lp('ex_gif_'+exId);
  if(cached){
    gifEl.innerHTML=`<img src="${cached}" alt="${ex.nombre}" loading="lazy">`;
    return;
  }

  try{
    const query=encodeURIComponent(ex.ex_db_name||ex.nombre);
    const url=`https://corsproxy.io/?url=${encodeURIComponent('https://exercisedb.io/api/v2/exercises/name/'+query+'?limit=1')}`;
    const res=await fetch(url,{headers:{'x-requested-with':'XMLHttpRequest'}});
    const data=await res.json();
    if(data&&data[0]?.gifUrl){
      const gifUrl=data[0].gifUrl;
      sp('ex_gif_'+exId, gifUrl); // cache it
      gifEl.innerHTML=`<img src="${gifUrl}" alt="${ex.nombre}" loading="lazy" style="width:100%;border-radius:14px">`;
    }else{
      throw new Error('No GIF found');
    }
  }catch(e){
    // Fallback: show SVG muscle diagram
    gifEl.innerHTML=renderMuscleDiagram(ex);
  }
}

// ── TOGGLE SET ──
function toggleSet(exId, setIdx){
  const ex=PROGRAMA[curDay]?.ejercicios?.find(e=>e.id===exId);if(!ex)return;
  const sets=getSetsForToday(exId);
  while(sets.length<=setIdx) sets.push({reps:'',peso:getWeightForEx(exId),done:false});
  const repsEl=document.getElementById('reps-'+exId+'-'+setIdx);
  const weightEl=document.getElementById('w-'+exId+'-'+setIdx);
  sets[setIdx]={
    reps:repsEl?.value||ex.reps,
    peso:parseFloat(weightEl?.value)||getWeightForEx(exId),
    done:!sets[setIdx].done
  };
  saveSets(exId, sets);
  // If done, save the weight used
  if(sets[setIdx].done&&sets[setIdx].peso){
    saveWeight(exId, sets[setIdx].peso);
    // Update weight tag
    const tagEl=document.getElementById('tag-w-'+exId);
    if(tagEl)tagEl.textContent=sets[setIdx].peso+'kg';
  }
  // Visual update
  const checkEl=document.getElementById('sc-'+exId+'-'+setIdx);
  if(checkEl){
    checkEl.className='set-check '+(sets[setIdx].done?'done':'');
    checkEl.textContent=sets[setIdx].done?'✓':'';
  }
  // Start rest timer if set done
  if(sets[setIdx].done) startRest(ex.rest_seg||60, ex.nombre);
  // Check if exercise fully completed
  if(sets.filter(s=>s.done).length>=ex.series){
    const checkEl2=document.getElementById('card-'+exId);
    if(checkEl2)checkEl2.classList.add('completed');
    const exCheck=checkEl2?.querySelector('.ex-check');
    if(exCheck)exCheck.classList.add('done');
    // Update progress
    renderDayStrip();
    renderWeekSummary();
  }
}

function updateSet(exId, setIdx){
  // Called on input change - save immediately
  const sets=getSetsForToday(exId);
  const repsEl=document.getElementById('reps-'+exId+'-'+setIdx);
  const weightEl=document.getElementById('w-'+exId+'-'+setIdx);
  while(sets.length<=setIdx) sets.push({reps:'',peso:getWeightForEx(exId),done:false});
  sets[setIdx].reps=repsEl?.value||'';
  sets[setIdx].peso=parseFloat(weightEl?.value)||getWeightForEx(exId);
  saveSets(exId, sets);
}

function markAllSets(exId){
  const ex=PROGRAMA[curDay]?.ejercicios?.find(e=>e.id===exId);if(!ex)return;
  const sets=getSetsForToday(exId);
  const curW=getWeightForEx(exId);
  // Fill empty sets
  while(sets.length<ex.series) sets.push({reps:ex.reps,peso:curW,done:false});
  const allDone=sets.every(s=>s.done);
  sets.forEach(s=>{s.done=!allDone;if(!s.reps)s.reps=ex.reps;if(!s.peso)s.peso=curW});
  saveSets(exId,sets);
  if(!allDone) saveWeight(exId, curW);
  renderWorkout();
}

// ── PROGRESSION CHECK ──
function checkProgression(exId){
  // Check last 14 days of sets for this exercise
  const history=lp('ex_history')||[];
  const recent=history.filter(h=>h.exId===exId).slice(-14);
  if(recent.length<6) return null; // not enough data
  const completedSessions=recent.filter(h=>h.sets?.filter(s=>s.done).length>=3);
  if(completedSessions.length>=4){
    const lastWeight=recent[recent.length-1]?.sets?.find(s=>s.done)?.peso||0;
    const firstWeight=recent[0]?.sets?.find(s=>s.done)?.peso||0;
    if(lastWeight===firstWeight&&lastWeight>0){
      return `Llevas ${completedSessions.length} sesiones completando todas las series con ${lastWeight}kg. Hora de subir a ${lastWeight+0.5}kg.`;
    }
  }
  return null;
}

// ── REST TIMER ──
let restInterval=null;
const CIRC=150.8;
function startRest(secs, exName){
  if(restInterval) clearInterval(restInterval);
  restSecsLeft=secs;
  const timer=document.getElementById('rest-timer');
  const count=document.getElementById('rest-count');
  const msg=document.getElementById('rest-msg');
  const arc=document.getElementById('rest-arc');
  if(!timer)return;
  timer.classList.add('visible');
  if(msg)msg.textContent=`Tras ${exName}`;
  const update=()=>{
    if(count)count.textContent=restSecsLeft;
    if(arc)arc.setAttribute('stroke-dashoffset',CIRC*(1-restSecsLeft/secs));
    if(restSecsLeft<=0){
      clearInterval(restInterval);
      timer.classList.remove('visible');
      // Vibrate if supported
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
    }
    restSecsLeft--;
  };
  update();
  restInterval=setInterval(update,1000);
}
function skipRest(){
  if(restInterval)clearInterval(restInterval);
  const timer=document.getElementById('rest-timer');
  if(timer)timer.classList.remove('visible');
}

// ── FINISH WORKOUT ──
async function finishWorkout(){
  const prog=PROGRAMA[curDay];
  let totalSeries=0,maxPeso=0;
  prog.ejercicios.forEach(ex=>{
    const sets=getSetsForToday(ex.id);
    totalSeries+=sets.filter(s=>s.done).length;
    sets.forEach(s=>{if((s.peso||0)>maxPeso)maxPeso=s.peso});
  });
  // Save workout summary
  const workouts=lp('workouts_done')||[];
  workouts.push({fecha:dk(),dia:curDay,tipo:prog.tipo,series:totalSeries});
  sp('workouts_done',workouts.slice(-60));
  // Show overlay
  const overlay=document.getElementById('complete-overlay');
  const sub=document.getElementById('complete-sub');
  const stats=document.getElementById('complete-stats');
  if(overlay)overlay.classList.add('show');
  if(sub)sub.textContent=`${prog.label} · ${prog.tipo} completado. ¡Lo has conseguido!`;
  if(stats)stats.innerHTML=`
    <div class="complete-stat"><div class="complete-stat-val">${prog.ejercicios.length}</div><div class="complete-stat-lbl">Ejercicios</div></div>
    <div class="complete-stat"><div class="complete-stat-val">${totalSeries}</div><div class="complete-stat-lbl">Series</div></div>
    <div class="complete-stat"><div class="complete-stat-val">${maxPeso||'—'}kg</div><div class="complete-stat-lbl">Max peso</div></div>`;
  // Get AI feedback
  const aiEl=document.getElementById('complete-ai');
  if(aiEl){
    aiEl.style.display='block';
    aiEl.innerHTML='🤖 Generando análisis del entrenamiento...';
    try{
      const prompt=`Entrenador personal. Daniel ha completado su entrenamiento de ${prog.tipo} (${prog.grupos.join(', ')}). Ha hecho ${totalSeries} series en total. Peso máximo usado: ${maxPeso}kg. Lleva entrenando poco tiempo con mancuernas en casa, objetivo: recomposición corporal.

Escribe un mensaje de cierre motivador y ÚTIL en 2-3 frases. Incluye: qué hacer las próximas horas para maximizar la recuperación (proteína, agua, sueño). Sé específico y personal. Nada de frases vacías de gym.`;
      const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
        method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
        body:JSON.stringify({model:'llama-3.1-8b-instant',max_tokens:200,temperature:0.5,messages:[{role:'user',content:prompt}]})
      });
      const data=await res.json();
      aiEl.innerHTML='<div style="font-size:14px;line-height:1.65">'+( data.choices?.[0]?.message?.content||'')+'</div>';
    }catch(e){aiEl.style.display='none'}
  }
}
function closeComplete(){
  document.getElementById('complete-overlay')?.classList.remove('show');
  renderDayStrip();renderWeekSummary();renderWorkout();
}

// ── HISTORY TAB ──
function renderHistory(){
  const el=document.getElementById('history-content');if(!el)return;
  const history=lp('ex_history')||[];
  if(!history.length){
    el.innerHTML=`<div class="empty-state"><div class="em-icon">📊</div><p>Aún no tienes historial.<br>Completa tu primer entrenamiento.</p></div>`;
    return;
  }
  // Group by date
  const byDate={};
  history.forEach(h=>{
    if(!byDate[h.fecha])byDate[h.fecha]={fecha:h.fecha,ejercicios:[]};
    // Merge by exercise
    const existing=byDate[h.fecha].ejercicios.find(e=>e.exId===h.exId);
    if(!existing) byDate[h.fecha].ejercicios.push(h);
  });
  const dates=Object.keys(byDate).sort().reverse().slice(0,14);
  let html='';
  dates.forEach(fecha=>{
    const entry=byDate[fecha];
    const d=new Date(fecha+'T12:00:00');
    const dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    html+=`<div class="hist-card">
      <div class="hist-date">${dias[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}</div>`;
    entry.ejercicios.forEach(e=>{
      const ex=Object.values(PROGRAMA).flatMap(p=>p.ejercicios||[]).find(ex=>ex.id===e.exId);
      const seriesDone=e.sets?.filter(s=>s.done).length||0;
      const maxW=e.sets?.reduce((max,s)=>Math.max(max,s.peso||0),0)||0;
      html+=`<div class="hist-row">
        <span class="hist-name">${ex?.nombre||e.exId}</span>
        <span class="hist-weight">${seriesDone} series${maxW?` · ${maxW}kg`:''}</span>
      </div>`;
    });
    html+='</div>';
  });
  el.innerHTML=html;
}

      }).join('')||'<div style="font-size:13px;color:var(--tx3)">Registra pesos para ver tu progresión.</div>'}
    </div>`;
  el.innerHTML=html;
}

// ── START ──
init();
</script>
